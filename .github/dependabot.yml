version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    groups:
      github/codeql-action:
          patterns:
              - 'github/codeql-action/*'

  - package-ecosystem: pip
    directories:
      - "/compare_pdfs"
      - "/convert_source_description"
      - "/unify_ids"
    schedule:
      interval: daily
    allow:
      - dependency-type: "all"
