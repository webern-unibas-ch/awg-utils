name: Pylint

on:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - '.gitignore'
      - '.prettierrc'
      - '**/*.svg'
      - '**/*.md'

permissions:
  contents: read

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      changed_dirs: ${{ steps.filter.outputs.changes }}

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit
    
    - id: filter
      uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
      with:
        filters: |
          compare_pdfs:
            - 'compare_pdfs/**'
            - '.github/workflows/pylint.yml'
          convert_intro_to_md:
            - 'convert_intro_to_md/**'
            - '.github/workflows/pylint.yml'
          convert_source_description:
            - 'convert_source_description/**'
            - '.github/workflows/pylint.yml'
          unify_ids:
            - 'unify_ids/**'
            - '.github/workflows/pylint.yml'

  lint:
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.changed_dirs != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        dir: ${{ fromJSON(needs.detect_changes.outputs.changed_dirs) }}
    
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit

    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ${{ matrix.dir }}
      run: |
        python -m ensurepip --upgrade
        pip install --require-hashes -r ./requirements.txt
      
    - name: Analysing the code with pylint
      working-directory: ${{ matrix.dir }}
      run: |
        find . -name "*.py" -not -path "./.venv/*" | while read file; do
          echo "Running pylint on $file"
          pylint "$file" || exit 1
        done
