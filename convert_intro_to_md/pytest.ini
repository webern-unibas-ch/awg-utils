# pytest.ini configuration for convert_intro_to_md test suite

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --disable-warnings
    --cov=convert_intro_to_md
    --cov=utils
    --cov-report=term-missing
    --cov-report=html:htmlcov
